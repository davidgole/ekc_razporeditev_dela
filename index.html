<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>Dnevni Obrazec</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .container { border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 300px; }
        input { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; cursor: pointer; background: #0070f3; color: white; border: none; border-radius: 5px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 15px; font-size: 0.9em; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h3>Dnevni vnos</h3>
    <input type="text" id="vnos" placeholder="Vpiši nekaj...">
    <button id="posljiGumb">Pošlji</button>
    <div id="status"></div>
</div>

<script>
    const gumb = document.getElementById('posljiGumb');
    const status = document.getElementById('status');
    const vnos = document.getElementById('vnos');

    gumb.addEventListener('click', async () => {
        const besedilo = vnos.id;
        
        status.innerText = "Pošiljam...";
        gumb.disabled = true;

        try {
            const response = await fetch('/api/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ vsebina: vnos.value })
            });

            const data = await response.json();

            if (response.ok) {
                status.style.color = "green";
                status.innerText = "Uspeh: " + data.success;
            } else {
                status.style.color = "red";
                status.innerText = "Napaka: " + data.error;
                // Če je že izpolnjeno, gumb ostane onemogočen
                if (response.status === 403) return;
            }
        } catch (err) {
            status.innerText = "Prišlo je do napake pri povezavi.";
        }
        
        gumb.disabled = false;
    });
</script>

</body>
</html>
